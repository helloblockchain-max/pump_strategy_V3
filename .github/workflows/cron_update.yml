name: Update Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Latest Data from APIs
        id: fetch_data
        run: python update_data.py

      - name: Verify data.json was updated
        run: |
          echo "=== Verifying data.json ==="
          if [ ! -f data.json ]; then
            echo "ERROR: data.json not found!"
            exit 1
          fi
          # Check file size > 100 bytes (not empty/corrupt)
          SIZE=$(stat -c%s data.json)
          echo "data.json size: ${SIZE} bytes"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: data.json too small (${SIZE} bytes), likely corrupt"
            exit 1
          fi
          # Show last_updated timestamp
          python3 -c "import json; d=json.load(open('data.json')); print(f'Last updated: {d.get(\"last_updated\",\"N/A\")}'); print(f'Data rows: {len(d.get(\"raw_data\",[]))}')"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,__pycache__,*.py,*.pyc'
          commit_message: "Auto-update: refresh data from APIs"
